<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinIO POC - Buckets</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-7xl p-4 md:p-8">
      <div id="pageShell"></div>

      <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
          <h2 class="text-xl font-semibold">Buckets list</h2>
          <button
            id="btnBuckets"
            class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-400 disabled:opacity-60"
          >
            Refresh Buckets
          </button>
        </div>

        <div class="grid grid-cols-1 gap-4 xl:grid-cols-2">
          <section class="rounded-lg border border-slate-800 bg-slate-950/70 p-3">
            <h3 class="mb-2 text-sm font-semibold text-slate-200">Existing buckets</h3>
            <div class="max-h-80 overflow-auto rounded border border-slate-800">
              <table class="w-full text-left text-xs">
                <thead class="bg-slate-900 text-slate-300">
                  <tr>
                    <th class="px-2 py-2">Bucket</th>
                    <th class="px-2 py-2">Status</th>
                    <th class="px-2 py-2">Objects</th>
                    <th class="px-2 py-2">Quota</th>
                    <th class="px-2 py-2">Actions</th>
                  </tr>
                </thead>
                <tbody id="bucketsTable"></tbody>
              </table>
            </div>
          </section>

          <section class="rounded-lg border border-slate-800 bg-slate-950/70 p-3">
            <h3 class="mb-2 text-sm font-semibold text-slate-200">Create / update bucket</h3>
            <div class="grid grid-cols-1 gap-2 md:grid-cols-2">
              <label class="text-xs">
                <span class="mb-1 block text-slate-300">Store ID</span>
                <input
                  id="bucketName"
                  value="demo"
                  class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm"
                />
              </label>
              <label class="text-xs">
                <span class="mb-1 block text-slate-300">Password</span>
                <input
                  id="bucketPassword"
                  value="123456789"
                  class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm"
                />
              </label>
              <label class="text-xs">
                <span class="mb-1 block text-slate-300">Quota (MB)</span>
                <input
                  id="bucketQuotaMb"
                  value="128"
                  class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm"
                />
              </label>
            </div>

            <div class="mt-3 flex flex-wrap gap-2">
              <button
                id="btnUpsertBucket"
                class="rounded bg-cyan-500 px-3 py-2 text-xs font-medium text-slate-950 hover:bg-cyan-400 disabled:opacity-60"
              >
                Upsert
              </button>
              <button
                id="btnBucketInfo"
                class="rounded bg-sky-500 px-3 py-2 text-xs font-medium text-slate-950 hover:bg-sky-400 disabled:opacity-60"
              >
                Info
              </button>
              <button
                id="btnEnableBucket"
                class="rounded bg-emerald-500 px-3 py-2 text-xs font-medium text-slate-950 hover:bg-emerald-400 disabled:opacity-60"
              >
                Enable
              </button>
              <button
                id="btnDisableBucket"
                class="rounded bg-amber-500 px-3 py-2 text-xs font-medium text-slate-950 hover:bg-amber-400 disabled:opacity-60"
              >
                Disable
              </button>
              <button
                id="btnDeleteBucketForm"
                class="rounded bg-rose-700 px-3 py-2 text-xs font-medium text-white hover:bg-rose-600 disabled:opacity-60"
              >
                Delete
              </button>
            </div>

            <pre id="bucketInfoRaw" class="mt-3 max-h-44 overflow-auto rounded bg-slate-900 p-2 text-xs text-slate-300"></pre>
          </section>
        </div>
      </section>

      <section class="mt-6 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-semibold">Output</h2>
          <div class="flex gap-2">
            <button id="btnCopyOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Copy</button>
            <button id="btnClearOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Clear</button>
          </div>
        </div>
        <pre id="output" class="max-h-[360px] overflow-auto rounded bg-slate-950 p-3 text-xs text-slate-200"></pre>
      </section>
    </main>

    <script type="module" src="/public/js/buckets-page.js"></script>
  </body>
</html>
