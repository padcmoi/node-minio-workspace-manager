<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinIO Workspace Manager POC</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-7xl p-4 md:p-8">
      <header class="mb-6">
        <h1 class="text-2xl font-bold md:text-3xl">MinIO Workspace Manager POC</h1>
        <p class="mt-2 text-sm text-slate-300">Single-page control panel LIVE TEST OK.</p>
      </header>

      <section class="mb-6 rounded-xl border border-slate-800 bg-slate-900/60 p-4">
        <h2 class="mb-3 text-lg font-semibold">Global</h2>
        <div class="flex flex-wrap items-center gap-3">
          <button
            id="btnHealth"
            class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-emerald-400"
          >
            Check Health
          </button>
        </div>
      </section>

      <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
        <section class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
          <h2 class="mb-4 text-lg font-semibold">Admin Buckets</h2>

          <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Bucket Name (without prefix)</span>
              <input
                id="bucketName"
                value="store-demo"
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              />
            </label>
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Password</span>
              <input
                id="bucketPassword"
                value="123456789"
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              />
            </label>
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Quota (MB)</span>
              <input
                id="bucketQuotaMb"
                value="128"
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              />
            </label>
          </div>

          <div class="mt-4 flex flex-wrap gap-2">
            <button
              id="btnUpsertBucket"
              class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-cyan-400"
            >
              Upsert Bucket
            </button>
            <button
              id="btnDeleteBucket"
              class="rounded-lg bg-rose-500 px-4 py-2 text-sm font-medium text-white hover:bg-rose-400"
            >
              Delete Bucket
            </button>
            <button
              id="btnListBuckets"
              class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-400"
            >
              List Buckets
            </button>
            <button
              id="btnBucketInfo"
              class="rounded-lg bg-sky-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-sky-400"
            >
              Bucket Info
            </button>
            <button
              id="btnEnableBucket"
              class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-emerald-400"
            >
              Set Enabled
            </button>
            <button
              id="btnDisableBucket"
              class="rounded-lg bg-amber-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-amber-400"
            >
              Set Disabled
            </button>
          </div>
        </section>

        <section class="rounded-xl border border-slate-800 bg-slate-900/60 p-4">
          <h2 class="mb-4 text-lg font-semibold">Storage</h2>

          <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Store ID</span>
              <input id="storeId" value="demo" class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </label>
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Namespace</span>
              <input
                id="namespace"
                value="docs"
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              />
            </label>
            <label class="text-sm">
              <span class="mb-1 block text-slate-300">Prefix (optional)</span>
              <input id="prefix" value="inbox" class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="mb-1 block text-slate-300">Refs JSON array (optional)</span>
              <input
                id="refs"
                value='["alpha","beta"]'
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="mb-1 block text-slate-300">Files (multi)</span>
              <input
                id="files"
                type="file"
                multiple
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm file:mr-3 file:rounded file:border-0 file:bg-slate-700 file:px-3 file:py-1 file:text-sm"
              />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="mb-1 block text-slate-300">Target Key (for view/download)</span>
              <input id="targetKey" class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
            </label>
            <label class="text-sm md:col-span-2">
              <span class="mb-1 block text-slate-300">Keys JSON array (for delete)</span>
              <textarea
                id="deleteKeys"
                rows="4"
                class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm"
              ></textarea>
            </label>
          </div>

          <div class="mt-4 flex flex-wrap gap-2">
            <button id="btnUpload" class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-cyan-400">
              Upload Files
            </button>
            <button
              id="btnListFiles"
              class="rounded-lg bg-indigo-500 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-400"
            >
              List Files
            </button>
            <button id="btnDeleteFiles" class="rounded-lg bg-rose-500 px-4 py-2 text-sm font-medium text-white hover:bg-rose-400">
              Delete Files
            </button>
            <button id="btnViewFile" class="rounded-lg bg-sky-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-sky-400">
              View File
            </button>
            <button
              id="btnDownloadFile"
              class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-emerald-400"
            >
              Download File
            </button>
          </div>
        </section>
      </div>

      <section class="mt-6 rounded-xl border border-slate-800 bg-slate-900/60 p-4">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-semibold">Output</h2>
          <button id="btnClearOutput" class="rounded bg-slate-700 px-3 py-1 text-xs font-medium hover:bg-slate-600">Clear</button>
        </div>
        <pre id="output" class="max-h-[420px] overflow-auto rounded-lg bg-slate-950 p-3 text-xs text-slate-200"></pre>
      </section>
    </main>

    <script>
      const outputEl = document.getElementById("output");
      let lastListedKeys = [];

      function readValue(id) {
        const el = document.getElementById(id);
        if (!el) return "";
        return String(el.value ?? "").trim();
      }

      function writeOutput(label, payload) {
        const ts = new Date().toISOString();
        const body = typeof payload === "string" ? payload : JSON.stringify(payload, null, 2);
        outputEl.textContent = "[" + ts + "] " + label + "\\n" + body + "\\n\\n" + outputEl.textContent;
      }

      function parseJsonArray(raw, fallback) {
        if (!raw) return fallback;
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            return parsed.filter((item) => typeof item === "string");
          }
          return fallback;
        } catch {
          return fallback;
        }
      }

      function encodeKey(key) {
        return encodeURIComponent(key);
      }

      async function requestJson(method, path, body) {
        const options = {
          method,
          headers: {},
        };

        if (body !== undefined) {
          options.headers["content-type"] = "application/json";
          options.body = JSON.stringify(body);
        }

        const response = await fetch(path, options);
        const text = await response.text();
        let parsed = text;

        try {
          parsed = text ? JSON.parse(text) : null;
        } catch {
          parsed = text;
        }

        if (!response.ok) {
          writeOutput(method + " " + path + " ERROR", parsed);
          throw new Error("Request failed with status " + response.status);
        }

        writeOutput(method + " " + path, parsed);
        return parsed;
      }

      function buildStoragePath(suffix) {
        const storeId = readValue("storeId") || "demo";
        const namespace = readValue("namespace") || "docs";
        return "/storage/" + encodeURIComponent(storeId) + "/" + encodeURIComponent(namespace) + suffix;
      }

      async function health() {
        await requestJson("GET", "/health");
      }

      async function upsertBucket() {
        const name = readValue("bucketName");
        const password = readValue("bucketPassword");
        const quotaMbRaw = readValue("bucketQuotaMb");
        const quotaMb = Number(quotaMbRaw);

        await requestJson("POST", "/admin/buckets/" + encodeURIComponent(name) + "/upsert", {
          password,
          quotaMb: Number.isFinite(quotaMb) ? quotaMb : undefined,
        });
      }

      async function deleteBucket() {
        const name = readValue("bucketName");
        await requestJson("DELETE", "/admin/buckets/" + encodeURIComponent(name));
      }

      async function listBuckets() {
        await requestJson("GET", "/admin/buckets");
      }

      async function bucketInfo() {
        const name = readValue("bucketName");
        await requestJson("GET", "/admin/buckets/" + encodeURIComponent(name));
      }

      async function setBucketEnabled(enabled) {
        const name = readValue("bucketName");
        await requestJson("POST", "/admin/buckets/" + encodeURIComponent(name) + "/enabled", { enabled });
      }

      async function uploadFiles() {
        const input = document.getElementById("files");
        const files = Array.from(input.files || []);

        if (!files.length) {
          writeOutput("UPLOAD", "No files selected");
          return;
        }

        const form = new FormData();
        for (const file of files) {
          form.append("files", file, file.name);
        }

        const refs = parseJsonArray(readValue("refs"), []);
        if (refs.length) {
          form.append("refs", JSON.stringify(refs));
        }

        const prefix = readValue("prefix");
        if (prefix) {
          form.append("prefix", prefix);
        }

        const path = buildStoragePath("/files");
        const response = await fetch(path, { method: "POST", body: form });
        const text = await response.text();
        const parsed = text ? JSON.parse(text) : null;

        if (!response.ok) {
          writeOutput("POST " + path + " ERROR", parsed);
          throw new Error("Upload failed");
        }

        writeOutput("POST " + path, parsed);
      }

      async function listFiles() {
        const prefix = readValue("prefix");
        const query = prefix ? "?prefix=" + encodeURIComponent(prefix) : "";
        const path = buildStoragePath("/files" + query);
        const data = await requestJson("GET", path);

        const keys = Array.isArray(data?.objects)
          ? data.objects.map((item) => item?.key).filter((item) => typeof item === "string")
          : [];
        lastListedKeys = keys;

        if (keys.length) {
          const targetEl = document.getElementById("targetKey");
          targetEl.value = keys[0];
          const deleteEl = document.getElementById("deleteKeys");
          deleteEl.value = JSON.stringify(keys, null, 2);
        }
      }

      async function deleteFiles() {
        const raw = readValue("deleteKeys");
        const keys = parseJsonArray(raw, lastListedKeys);
        const path = buildStoragePath("/files");
        await requestJson("DELETE", path, { keys });
      }

      async function viewFile() {
        const key = readValue("targetKey");
        if (!key) {
          writeOutput("VIEW", "Missing target key");
          return;
        }

        const path = buildStoragePath("/view?key=" + encodeKey(key));
        const response = await fetch(path);
        const blob = await response.blob();
        const text = await blob.text();

        if (!response.ok) {
          writeOutput("GET " + path + " ERROR", text);
          throw new Error("View failed");
        }

        writeOutput("GET " + path, {
          status: response.status,
          contentType: response.headers.get("content-type"),
          contentDisposition: response.headers.get("content-disposition"),
          preview: text.slice(0, 1500),
        });
      }

      async function downloadFile() {
        const key = readValue("targetKey");
        if (!key) {
          writeOutput("DOWNLOAD", "Missing target key");
          return;
        }

        const path = buildStoragePath("/file?key=" + encodeKey(key));
        const response = await fetch(path);
        const blob = await response.blob();

        if (!response.ok) {
          const text = await blob.text();
          writeOutput("GET " + path + " ERROR", text);
          throw new Error("Download failed");
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = key.split("/").pop() || "download.bin";
        link.click();
        URL.revokeObjectURL(url);

        writeOutput("GET " + path, {
          status: response.status,
          size: blob.size,
          contentType: response.headers.get("content-type"),
          contentDisposition: response.headers.get("content-disposition"),
        });
      }

      function wire(id, handler) {
        const el = document.getElementById(id);
        el.addEventListener("click", () => {
          Promise.resolve(handler()).catch((error) => {
            writeOutput("Unhandled error", String(error?.message || error));
          });
        });
      }

      wire("btnHealth", health);
      wire("btnUpsertBucket", upsertBucket);
      wire("btnDeleteBucket", deleteBucket);
      wire("btnListBuckets", listBuckets);
      wire("btnBucketInfo", bucketInfo);
      wire("btnEnableBucket", () => setBucketEnabled(true));
      wire("btnDisableBucket", () => setBucketEnabled(false));
      wire("btnUpload", uploadFiles);
      wire("btnListFiles", listFiles);
      wire("btnDeleteFiles", deleteFiles);
      wire("btnViewFile", viewFile);
      wire("btnDownloadFile", downloadFile);

      document.getElementById("btnClearOutput").addEventListener("click", () => {
        outputEl.textContent = "";
      });
    </script>
  </body>
</html>
