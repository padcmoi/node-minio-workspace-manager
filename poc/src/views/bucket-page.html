<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinIO POC - Bucket</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-7xl p-4 md:p-8">
      <div id="pageShell"></div>

      <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
          <h2 id="bucketViewTitle" class="text-xl font-semibold">Bucket workspace</h2>
          <div class="flex flex-wrap items-center gap-2 text-xs text-slate-300">
            <span class="rounded-full border border-slate-700 px-3 py-1" id="selectedBucketBadge">No bucket selected</span>
            <button
              id="btnBucketViewRefresh"
              class="rounded bg-indigo-500 px-3 py-1 font-medium text-white hover:bg-indigo-400 disabled:opacity-60"
            >
              Refresh bucket
            </button>
          </div>
        </div>

        <div class="mt-3">
          <section class="rounded-lg border border-slate-800 bg-slate-950/70 p-3">
            <div class="mb-2 flex items-center justify-between gap-2">
              <h3 class="text-sm font-semibold text-slate-200">Folder navigation</h3>
              <button
                id="btnListFiles"
                class="rounded bg-indigo-500 px-3 py-2 text-xs font-medium text-white hover:bg-indigo-400 disabled:opacity-60"
              >
                Refresh tree
              </button>
            </div>
            <div id="treePanel" class="max-h-[360px] overflow-auto text-sm"></div>
          </section>
        </div>

        <section class="mt-3 rounded-lg border border-slate-800 bg-slate-950/70 p-3">
          <h3 class="mb-2 text-sm font-semibold text-slate-200">Context + upload</h3>
          <fieldset id="storageFieldset" class="grid grid-cols-1 gap-2 md:grid-cols-2">
            <label class="text-xs">
              <span class="mb-1 block text-slate-300">Namespace</span>
              <input id="namespace" value="docs" class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm" />
              <span class="mt-1 block text-[11px] text-slate-400"
                >Namespace is strongly recommended (practically required for consistent usage).</span
              >
            </label>
            <label class="text-xs">
              <span class="mb-1 block text-slate-300">Folder path from namespace (unlimited nested subfolders)</span>
              <input
                id="prefix"
                value=""
                placeholder="g/d/g/s/e/f"
                class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm"
              />
            </label>
            <label class="text-xs md:col-span-2">
              <span class="mb-1 block text-slate-300">Refs JSON array (optional)</span>
              <input
                id="refs"
                value="[]"
                placeholder='["ref-1","ref-2"]'
                class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm"
              />
            </label>
            <label class="text-xs md:col-span-2">
              <span class="mb-1 block text-slate-300">Upload files</span>
              <input
                id="files"
                type="file"
                multiple
                class="w-full rounded border border-slate-700 bg-slate-950 px-2 py-2 text-sm file:mr-3 file:rounded file:border-0 file:bg-slate-700 file:px-3 file:py-1"
              />
            </label>
          </fieldset>

          <div class="mt-3 flex flex-wrap gap-2">
            <button
              id="btnUpload"
              class="rounded bg-cyan-500 px-3 py-2 text-xs font-medium text-slate-950 hover:bg-cyan-400 disabled:opacity-60"
            >
              Upload
            </button>
          </div>
        </section>

        <div class="mt-3 rounded-lg border border-slate-800 bg-slate-950/70 p-3">
          <h3 class="mb-2 text-sm font-semibold text-slate-200">Bucket info JSON</h3>
          <pre id="bucketInfoRaw" class="max-h-44 overflow-auto rounded bg-slate-900 p-2 text-xs text-slate-300"></pre>
        </div>
      </section>

      <section class="mt-6 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-semibold">Output</h2>
          <div class="flex gap-2">
            <button id="btnCopyOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Copy</button>
            <button id="btnClearOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Clear</button>
          </div>
        </div>
        <pre id="output" class="max-h-[360px] overflow-auto rounded bg-slate-950 p-3 text-xs text-slate-200"></pre>
      </section>
    </main>

    <script id="bucket-page-context" type="application/json">
      __POC_BUCKET_CONTEXT_JSON__
    </script>
    <script type="module" src="/public/js/bucket-page.js?v=10"></script>
  </body>
</html>
