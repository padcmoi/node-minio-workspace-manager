<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinIO POC - Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto w-full max-w-7xl p-4 md:p-8">
      <div id="pageShell"></div>

      <section class="rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-3 flex flex-wrap items-center justify-between gap-3">
          <h2 class="text-xl font-semibold">Stats</h2>
          <div class="flex gap-2">
            <button
              id="btnHealth"
              class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-emerald-400 disabled:opacity-60"
            >
              Health
            </button>
            <button
              id="btnMetrics"
              class="rounded-lg bg-cyan-500 px-4 py-2 text-sm font-medium text-slate-950 hover:bg-cyan-400 disabled:opacity-60"
            >
              Refresh Metrics
            </button>
          </div>
        </div>

        <div class="rounded-lg border border-slate-800 bg-slate-950/70 p-3">
          <h3 class="mb-2 text-sm font-semibold text-slate-200">Server summary</h3>
          <div id="metricsCards" class="grid grid-cols-1 gap-2 text-sm md:grid-cols-3"></div>
        </div>

        <div class="mt-3 rounded-lg border border-slate-800 bg-slate-950/70 p-3">
          <h3 class="mb-2 text-sm font-semibold text-slate-200">Raw metrics JSON</h3>
          <pre id="metricsRaw" class="max-h-56 overflow-auto rounded bg-slate-900 p-3 text-xs text-slate-300"></pre>
        </div>
      </section>

      <section class="mt-6 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-semibold">Output</h2>
          <div class="flex gap-2">
            <button id="btnCopyOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Copy</button>
            <button id="btnClearOutput" class="rounded bg-slate-700 px-3 py-1 text-xs hover:bg-slate-600">Clear</button>
          </div>
        </div>
        <pre id="output" class="max-h-[360px] overflow-auto rounded bg-slate-950 p-3 text-xs text-slate-200"></pre>
      </section>
    </main>

    <script type="module" src="/public/js/stats-page.js"></script>
  </body>
</html>
